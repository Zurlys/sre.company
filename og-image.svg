<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#181d28" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="40%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b7cff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#080a0f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080a0f"/>
  <!-- Grid -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <!-- Glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Accent line -->
  <rect x="80" y="240" width="40" height="2" fill="#3b7cff"/>

  <!-- Eyebrow -->
  <text x="132" y="254" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#3b7cff" letter-spacing="3">INFRASTRUCTURE ENGINEERING</text>

  <!-- Main wordmark -->
  <text x="78" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="80" font-weight="700" fill="#e8ecf4" letter-spacing="-3">SRE<tspan fill="#525c6e" font-weight="400">.company</tspan></text>

  <!-- Tagline -->
  <text x="80" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#525c6e">Reliability is not an accident.</text>

  <!-- Bottom locations -->
  <text x="80" y="540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="400" fill="#2a3348">Lithuania · Luxembourg · Canary Islands</text>
</svg>
